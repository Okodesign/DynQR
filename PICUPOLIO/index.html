<script>
    // Obtenemos el "id" de la URL (ejemplo: ?id=1)

        "2": "https://www.mieres.es/turismo/georrutas/picupolio/2",

        "4": "https://www.mieres.es/turismo/georrutas/picupolio/4",
        "5": "https://www.mieres.es/turismo/georrutas/picupolio/5",
        "6": "https://www.mieres.es/turismo/georrutas/picupolio/6",
        "7": "https://www.mieres.es/turismo/georrutas/picupolio/7",
        "8": "https://www.mieres.es/turismo/georrutas/picupolio/8",
        "9": "https://www.mieres.es/turismo/georrutas/picupolio/9",
    };

    // Si el ID existe en la lista, redirige. Si no, va a mieres.es
    if (links[destino]) {

    } else {
        window.location.href = "https://www.mieres.es/";
    }
</script>
